<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MVP 抽獎機 · 後台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Baloo+2:wght@500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#1A0B33; --panel:#2A1454; --line:#4A2C87;
    --turf:#00E6B8; --gold:#FFD400; --orange:#FF6A00; --pink:#FF2E9A;
    --chalk:#FFFFFF; --chalk-dim:#C9B8F0;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--chalk);font-family:'Rajdhani',sans-serif;}
  .stadium-bg{
    min-height:100vh;position:relative;overflow:hidden;
    background:
      radial-gradient(ellipse 700px 500px at 12% -8%, rgba(255,106,0,.3), transparent 55%),
      radial-gradient(ellipse 700px 500px at 90% 0%, rgba(255,46,154,.25), transparent 55%),
      linear-gradient(160deg, #1A0B33 0%, #250F4A 45%, #1A0B33 100%);
  }
  .conn-badge{
    position:fixed;top:14px;right:14px;font-family:'Baloo 2',sans-serif;font-size:12px;font-weight:700;
    padding:6px 14px;border-radius:999px;background:rgba(0,230,184,.15);color:var(--turf);
    border:1px solid rgba(0,230,184,.4);z-index:10;
  }
  .conn-badge.off{background:rgba(255,46,154,.15);color:var(--pink);border-color:rgba(255,46,154,.4);}

  .admin-wrap{max-width:560px;margin:0 auto;padding:56px 20px 80px;}
  .eyebrow{
    display:inline-flex;align-items:center;gap:8px;color:#fff;font-family:'Baloo 2',sans-serif;
    font-weight:700;font-size:13px;letter-spacing:.15em;background:linear-gradient(90deg,var(--turf),#00B894);
    padding:7px 18px;border-radius:999px;margin-bottom:20px;
  }
  .eyebrow .dot{width:7px;height:7px;border-radius:50%;background:#fff;}
  .title-xl{font-family:'Anton',sans-serif;font-size:clamp(28px,7vw,40px);line-height:1.15;margin:0 0 8px;}
  .subtitle{color:var(--chalk-dim);font-size:15px;font-weight:600;margin-bottom:32px;}

  .form-card{background:var(--panel);border:2px solid var(--line);border-radius:20px;padding:24px;margin-bottom:18px;}
  .form-card h3{font-family:'Baloo 2',sans-serif;font-weight:700;font-size:18px;margin:0 0 4px;}
  .form-card .hint{color:var(--chalk-dim);font-size:13px;margin:0 0 18px;}

  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .field label{font-size:11px;letter-spacing:.06em;color:var(--chalk-dim);font-weight:700;text-transform:uppercase;}
  .field input{
    background:#160A30;border:2px solid var(--line);border-radius:12px;color:var(--chalk);
    padding:12px 14px;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;
    outline:none;transition:.15s;width:100%;
  }
  .field input:focus{border-color:var(--pink);box-shadow:0 0 0 3px rgba(255,46,154,.18);}
  .field .num-badge{
    display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;
    background:linear-gradient(135deg,var(--orange),var(--pink));color:#fff;font-family:'Anton',sans-serif;
    font-size:10px;border-radius:6px;margin-right:6px;
  }

  .photo-row{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .avatar-preview{
    width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;
    background:#160A30;border:2px solid var(--line);color:var(--chalk-dim);
    display:flex;align-items:center;justify-content:center;
  }
  .avatar-preview img{width:100%;height:100%;object-fit:cover;display:block;}
  .avatar-preview svg{width:56%;height:56%;}
  .upload-btn{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;color:var(--turf);
    background:#160A30;border:2px solid rgba(0,230,184,.35);border-radius:999px;
    padding:8px 16px;cursor:pointer;transition:.15s;
  }
  .upload-btn:hover{border-color:var(--turf);}
  .clear-btn{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:13px;color:var(--chalk-dim);
    background:none;border:none;cursor:pointer;padding:8px 4px;text-decoration:underline;
  }

  .status-strip{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .status-chip{
    font-family:'Baloo 2',sans-serif;font-size:11px;font-weight:700;padding:6px 12px;border-radius:999px;
    background:rgba(0,230,184,.14);color:var(--turf);border:1px solid rgba(0,230,184,.35);
  }
  .status-chip.pending{background:rgba(255,255,255,.05);color:var(--chalk-dim);border-color:var(--line);}
  .warn-msg{color:var(--pink);font-size:13px;font-weight:700;margin:0 0 14px;display:none;}
  .warn-msg.show{display:block;}

  .btn{
    font-family:'Baloo 2',sans-serif;font-weight:700;font-size:16px;padding:15px 28px;
    border-radius:14px;border:none;cursor:pointer;width:100%;transition:.15s;
  }
  .btn:disabled{opacity:.4;cursor:not-allowed;}
  .btn-primary{background:linear-gradient(90deg,var(--pink),var(--orange));color:#fff;box-shadow:0 10px 24px -8px rgba(255,46,154,.55);}
  .btn-primary:hover:not(:disabled){transform:translateY(-2px);}
  .btn-secondary{background:#160A30;color:var(--turf);border:2px solid rgba(0,230,184,.4);margin-top:14px;}
  .btn-secondary:hover:not(:disabled){border-color:var(--turf);}

  .last-result{
    margin-top:6px;padding:14px 16px;border-radius:14px;background:rgba(255,212,0,.1);
    border:1px dashed var(--gold);color:var(--gold);font-family:'Baloo 2',sans-serif;font-weight:700;
    font-size:14px;display:none;
  }
  .last-result.show{display:block;}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--turf);color:#04140c;font-family:'Baloo 2',sans-serif;font-weight:700;
    padding:12px 22px;border-radius:999px;opacity:0;transition:.3s;z-index:50;font-size:14px;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="stadium-bg">
  <div class="conn-badge off" id="connBadge">連線中…</div>
  <div class="admin-wrap">
    <div class="eyebrow"><span class="dot"></span>BACKSTAGE · 後台設定</div>
    <h1 class="title-xl">項目冠軍<br>輸入面板</h1>
    <p class="subtitle">輸入四項競賽的第一名，按下按鈕後大螢幕會即時開獎</p>

    <div class="form-card">
      <h3>競賽項目與冠軍名單</h3>
      <p class="hint">請填寫四個項目的名稱與該項目第一名的姓名</p>
      <div class="field-row">
        <div class="field"><label><span class="num-badge">1</span>項目名稱</label><input type="text" id="game1" value="投籃" oninput="syncStatus()"></div>
        <div class="field"><label>第一名姓名</label><input type="text" id="name1" value="林小明" oninput="syncStatus()"></div>
      </div>
      <div class="photo-row">
        <div class="avatar-preview" id="preview1"></div>
        <label class="upload-btn">📷 上傳照片<input type="file" accept="image/*" id="photo1" onchange="handlePhoto(1)" hidden></label>
        <button type="button" class="clear-btn" onclick="clearPhoto(1)">清除</button>
      </div>
      <div class="field-row">
        <div class="field"><label><span class="num-badge">2</span>項目名稱</label><input type="text" id="game2" value="大隊接力" oninput="syncStatus()"></div>
        <div class="field"><label>第一名姓名</label><input type="text" id="name2" value="陳小明" oninput="syncStatus()"></div>
      </div>
      <div class="photo-row">
        <div class="avatar-preview" id="preview2"></div>
        <label class="upload-btn">📷 上傳照片<input type="file" accept="image/*" id="photo2" onchange="handlePhoto(2)" hidden></label>
        <button type="button" class="clear-btn" onclick="clearPhoto(2)">清除</button>
      </div>
      <div class="field-row">
        <div class="field"><label><span class="num-badge">3</span>項目名稱</label><input type="text" id="game3" value="吹泡泡" oninput="syncStatus()"></div>
        <div class="field"><label>第一名姓名</label><input type="text" id="name3" value="王小明" oninput="syncStatus()"></div>
      </div>
      <div class="photo-row">
        <div class="avatar-preview" id="preview3"></div>
        <label class="upload-btn">📷 上傳照片<input type="file" accept="image/*" id="photo3" onchange="handlePhoto(3)" hidden></label>
        <button type="button" class="clear-btn" onclick="clearPhoto(3)">清除</button>
      </div>
      <div class="field-row">
        <div class="field"><label><span class="num-badge">4</span>項目名稱</label><input type="text" id="game4" value="動動" oninput="syncStatus()"></div>
        <div class="field"><label>第一名姓名</label><input type="text" id="name4" value="王小二" oninput="syncStatus()"></div>
      </div>
      <div class="photo-row">
        <div class="avatar-preview" id="preview4"></div>
        <label class="upload-btn">📷 上傳照片<input type="file" accept="image/*" id="photo4" onchange="handlePhoto(4)" hidden></label>
        <button type="button" class="clear-btn" onclick="clearPhoto(4)">清除</button>
      </div>
      <button class="btn btn-secondary" id="syncBtn" onclick="syncCategories()">📤 同步名單到大螢幕</button>
    </div>

    <div class="form-card">
      <h3>抽獎狀態</h3>
      <p class="hint">確認四筆資料完整後即可開獎，大螢幕會同步播放動畫</p>
      <div class="status-strip" id="statusStrip"></div>
      <p class="warn-msg" id="warnMsg">⚠️ 請把四個項目的名稱與姓名都填寫完整</p>
      <button class="btn btn-primary" id="drawBtn" onclick="startDraw()">🎲 開始抽獎</button>
      <div class="last-result" id="lastResult"></div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ====== 請填入與 screen.html 相同的 Firebase 專案設定 ====== */
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyANPfyvEy-6ZQb0l2c2N6US1sJlVyGDuoU",
  authDomain: "mvp-lottery.firebaseapp.com",
  databaseURL: "https://mvp-lottery-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mvp-lottery",
};
/* ============================================ */

firebase.initializeApp(FIREBASE_CONFIG);
const db = firebase.database();
const roomRef = db.ref('mvpDraw');

db.ref('.info/connected').on('value', (snap)=>{
  const badge = document.getElementById('connBadge');
  if(snap.val() === true){ badge.textContent='已連線'; badge.classList.remove('off'); }
  else { badge.textContent='連線中…'; badge.classList.add('off'); }
});

function fieldIds(){
  return [1,2,3,4].map(i=>({game:document.getElementById('game'+i), name:document.getElementById('name'+i)}));
}

const DEFAULT_AVATAR = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg"><circle cx="50" cy="38" r="20" fill="currentColor"/><path d="M15 92c0-24 16-38 35-38s35 14 35 38" fill="currentColor"/></svg>`;
const photos = {1:null, 2:null, 3:null, 4:null};

[1,2,3,4].forEach(i=> document.getElementById('preview'+i).innerHTML = DEFAULT_AVATAR);

function handlePhoto(i){
  const input = document.getElementById('photo'+i);
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e)=>{
    const img = new Image();
    img.onload = ()=>{
      const size = 240;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const s = Math.min(img.width, img.height);
      const sx = (img.width - s) / 2, sy = (img.height - s) / 2;
      ctx.drawImage(img, sx, sy, s, s, 0, 0, size, size);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.72);
      photos[i] = dataUrl;
      document.getElementById('preview'+i).innerHTML = `<img src="${dataUrl}" alt="">`;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function clearPhoto(i){
  photos[i] = null;
  document.getElementById('photo'+i).value = '';
  document.getElementById('preview'+i).innerHTML = DEFAULT_AVATAR;
}

function syncStatus(){
  const strip = document.getElementById('statusStrip');
  const warn = document.getElementById('warnMsg');
  strip.innerHTML='';
  let allFilled = true;
  fieldIds().forEach(f=>{
    const g = f.game.value.trim();
    const n = f.name.value.trim();
    const ok = g && n;
    if(!ok) allFilled = false;
    const chip = document.createElement('span');
    chip.className = 'status-chip' + (ok ? '' : ' pending');
    chip.textContent = (ok ? '✓ ' : '… ') + (g || '未命名項目') + (ok ? ' 已輸入' : ' 未完成');
    strip.appendChild(chip);
  });
  warn.classList.toggle('show', !allFilled);
  document.getElementById('drawBtn').disabled = !allFilled;
  document.getElementById('syncBtn').disabled = !allFilled;
  return allFilled;
}

function syncCategories(){
  if(!syncStatus()) return;
  roomRef.update({ categories: collectCategories() }).then(()=>{
    showToast('✅ 名單已同步到大螢幕');
  }).catch((err)=>{
    showToast('❌ 同步失敗，請檢查網路或 Firebase 設定');
    console.error(err);
  });
}

function collectCategories(){
  return fieldIds().map((f,idx)=>({game:f.game.value.trim(), name:f.name.value.trim(), photo: photos[idx+1] || null}));
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

function startDraw(){
  if(!syncStatus()) return;
  const categories = collectCategories();
  const winnerIndex = Math.floor(Math.random()*categories.length);
  const token = Date.now().toString() + Math.random().toString(36).slice(2);

  document.getElementById('drawBtn').disabled = true;
  document.getElementById('drawBtn').textContent = '抽獎指令送出中…';

  roomRef.set({
    categories,
    round: { status:'spinning', winnerIndex, token }
  }).then(()=>{
    showToast('✅ 已送出，請看大螢幕開獎！');
    const result = document.getElementById('lastResult');
    result.textContent = '🏆 本輪 MVP：' + categories[winnerIndex].name;
    result.classList.add('show');
  }).catch((err)=>{
    showToast('❌ 傳送失敗，請檢查網路或 Firebase 設定');
    console.error(err);
  }).finally(()=>{
    document.getElementById('drawBtn').disabled = false;
    document.getElementById('drawBtn').textContent = '🔁 重新抽獎';
  });
}

syncStatus();
</script>
</body>
</html>
